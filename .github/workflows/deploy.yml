name: Deploy to EC2

on:
  push:
    branches:
      - main
      - Sprint_1_integracion-player

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Backend: install → generate Prisma → build ──────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── 4. Frontend: install → export web ──────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Expo web export)
        working-directory: frontend
        run: npx expo export --platform web

      # ── 5. Package artifacts ───────────────────────────────────────
      - name: Package backend artifact
        run: |
          tar czf /tmp/luki-backend.tar.gz \
            backend/dist \
            backend/prisma \
            backend/package.json \
            backend/package-lock.json

      - name: Package frontend artifact
        run: tar czf /tmp/luki-frontend.tar.gz -C frontend/dist .

      # ── 6. Deploy to EC2 ───────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare SMTP env fragment
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          printf '%s\n' \
            "SMTP_HOST=smtp.titan.email" \
            "SMTP_PORT=465" \
            "SMTP_SECURE=true" \
            "SMTP_USER=noreply@luki.ec" \
            "SMTP_PASS=${SMTP_PASS}" \
            "SMTP_FROM=noreply@luki.ec" \
            > /tmp/.env.smtp

      - name: Upload SMTP config to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/.env.smtp \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/.env.smtp

      - name: Upload backend to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/luki-backend.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/luki-backend.tar.gz

      - name: Upload frontend to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/luki-frontend.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/luki-frontend.tar.gz

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/Luki-Play-OTT

            # ── SMTP: upsert vars into backend/.env ─────────────────────
            ENV_FILE=~/Luki-Play-OTT/backend/.env
            touch "$ENV_FILE"
            while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" =~ ^[[:space:]]*# ]] && continue
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
              else
                echo "${key}=${value}" >> "$ENV_FILE"
              fi
            done < /tmp/.env.smtp
            rm -f /tmp/.env.smtp

            # Backend
            tar xzf /tmp/luki-backend.tar.gz
            rm /tmp/luki-backend.tar.gz
            cd backend
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart luki-play-backend
            cd ..

            # Frontend
            sudo rm -rf /var/www/luki-play-ott/*
            sudo tar xzf /tmp/luki-frontend.tar.gz -C /var/www/luki-play-ott/
            rm /tmp/luki-frontend.tar.gz

            # Nginx: aumentar límite de upload a 20MB
            if ! grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
              sudo sed -i 's/http {/http {\n    client_max_body_size 20M;/' /etc/nginx/nginx.conf
            else
              sudo sed -i 's/client_max_body_size.*/client_max_body_size 20M;/' /etc/nginx/nginx.conf
            fi
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deploy completed successfully"
          ENDSSH

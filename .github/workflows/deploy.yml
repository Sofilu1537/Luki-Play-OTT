name: Deploy to EC2

on:
  push:
    branches:
      - main
      - Sprint_1_integracion-player

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Backend: install → generate Prisma → build ──────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── 4. Frontend: install → export web ──────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Expo web export)
        working-directory: frontend
        run: npx expo export --platform web

      # ── 5. Package artifacts ───────────────────────────────────────
      - name: Package backend artifact
        run: |
          tar czf /tmp/luki-backend.tar.gz \
            backend/dist \
            backend/prisma \
            backend/package.json \
            backend/package-lock.json

      - name: Package frontend artifact
        run: tar czf /tmp/luki-frontend.tar.gz -C frontend/dist .

      # ── 6. Deploy to EC2 ───────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/luki-backend.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/luki-backend.tar.gz

      - name: Upload frontend to EC2
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/luki-frontend.tar.gz \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/luki-frontend.tar.gz

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/Luki-Play-OTT

            # Backend
            tar xzf /tmp/luki-backend.tar.gz
            rm /tmp/luki-backend.tar.gz
            cd backend
            npx prisma migrate deploy
            pm2 restart luki-play-backend
            cd ..

            # Frontend
            sudo rm -rf /var/www/luki-play-ott/*
            sudo tar xzf /tmp/luki-frontend.tar.gz -C /var/www/luki-play-ott/
            rm /tmp/luki-frontend.tar.gz

            echo "Deploy completed successfully"
          ENDSSH

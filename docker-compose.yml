version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://lukiplay_admin:dev_password_2026@postgres:5432/lukiplay_dev
      - REDIS_URL=redis://redis:6379
      - SUBSCRIBER_JWT_SECRET=dev-subscriber-jwt-secret-2026
      - ADMIN_JWT_SECRET=dev-admin-jwt-secret-2026
      - JWT_EXPIRATION=15m
      - REFRESH_TOKEN_EXPIRATION=7d
      - BCRYPT_SALT_ROUNDS=12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lukiplay_dev
      POSTGRES_USER: lukiplay_admin
      POSTGRES_PASSWORD: dev_password_2026
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lukiplay_admin -d lukiplay_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
